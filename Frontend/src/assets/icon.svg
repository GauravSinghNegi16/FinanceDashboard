<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4c1d95"></stop>
      <stop offset="100%" stop-color="#7c3aed"></stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="90" fill="url(#bgGradient)"></rect>

  <!-- Letter F -->
  <text x="140" y="300" font-size="220" font-weight="700" fill="white" font-family="Arial, sans-serif">
    F
  </text>

  <!-- Bar Chart -->
  <rect x="290" y="300" width="20" height="60" fill="white" opacity="0.6"></rect>
  <rect x="320" y="260" width="20" height="100" fill="white" opacity="0.7"></rect>
  <rect x="350" y="220" width="20" height="140" fill="white" opacity="0.8"></rect>

  <!-- Arrow -->
  <polyline points="290,280 330,250 370,210" fill="none" stroke="white" stroke-width="8"></polyline>
  <polygon points="370,210 360,210 370,195 380,210" fill="white"></polygon>

  <!-- Rupee Circle -->
  <circle cx="220" cy="360" r="40" fill="#6d28d9"></circle>
  <text x="200" y="375" font-size="40" fill="white" font-family="Arial, sans-serif">₹</text>
</svg>